name: Build iOS (test, unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 300
    steps:
      - name: Checkout (no submodules yet)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Fix submodule URLs and fetch them
        run: |
          git config --global url."https://github.com/TelegramMessenger/".insteadOf "https://github.com/dangeonmaster350-a11y/"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Replace server IP
        run: |
          echo "Заменяю IP на 31.77.148.109"
          grep -rl '192\.168\.1\.100' . --include=*.swift --include=*.m --include=*.h --include=*.cpp --include=*.plist --include=*.json 2>/dev/null \
            | xargs -r sed -i '' "s/192\.168\.1\.100/31.77.148.109/g"
          echo "Проверка оставшихся совпадений:"
          grep -rl '192\.168\.1\.100' . 2>/dev/null || echo "всё заменено"

      - name: Select Xcode 26.4.1
        run: sudo xcode-select -s "/Applications/Xcode_26.4.1.app"

      - name: Install Bazelisk
        run: brew install bazelisk

      - name: Prepare minimal config
        run: |
          cat > build-system/my_configuration.json << 'EOF'
          {
            "bundle_id": "com.dangeonmaster350.mytelegram",
            "api_id": "33633637",
            "api_hash": "db78a08b94e850ec2797fd8c9e009d19",
            "team_id": "",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          EOF
          cat build-system/my_configuration.json

      - name: Generate Xcode project
        run: |
          python3 build-system/Make/Make.py \
            --overrideXcodeVersion \
            --cacheDir="$HOME/telegram-bazel-cache" \
            generateProject \
            --configurationPath=build-system/my_configuration.json \
            --disableProvisioningProfiles

      - name: Build (no signing, compile test only)
        run: |
          xcodebuild -workspace Telegram.xcworkspace \
            -scheme Telegram \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/*.log
          if-no-files-found: ignore
          
